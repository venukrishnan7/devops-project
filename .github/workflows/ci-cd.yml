name: CI/CD Pipeline

# This triggers the pipeline whenever code is pushed to the main branch
# or when a Pull Request is opened!
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Task Service Dependencies (Test)
        working-directory: ./task-service
        run: npm install

      - name: Install User Service Dependencies (Test)
        working-directory: ./user-service
        run: npm install

      - name: Build Task Service Docker Image
        run: docker build -t task-service:test ./task-service

      - name: Build User Service Docker Image
        run: docker build -t user-service:test ./user-service

  infrastructure-deploy-check:
    runs-on: ubuntu-latest
    needs: build-and-test # Waits for the build to succeed first
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate & Plan (Simulated Deploy)
        run: |
          terraform validate
          # We don't run 'apply' here because it requires real cloud credentials,
          # but 'validate' proves our IaC is syntactically perfect! 